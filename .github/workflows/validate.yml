name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install AI package dependencies
        run: python -m pip install -r requirements/ai.txt

      - name: Regenerate derived files
        run: |
          python scripts/build_ai_package.py
          scripts/update_web_manifest.sh
          scripts/update_notebooklm_source.sh

      - name: Validate structure and metadata
        run: python scripts/validate_repository.py

      - name: Ensure generated files are committed
        run: git diff --exit-code
